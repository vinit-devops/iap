# The three findings that most affect the Developer Preview and the M19.3 real-AWS gate:
criticalFindings:
  - id: CF-1
    title: No real cloud execution anywhere
    detail: 'deploy/state/drift/reconcile run only against an in-memory mock; no cloud SDK, network, or credentials. M19.3 "real AWS golden path" is a BUILD task (new execution layer), not a validation task.'
  - id: CF-2
    title: No in-tree LLM
    detail: 'NL authoring + AI review are deterministic rule engines + an out-of-tree LLM adapter contract. The shipped capability is rules-based authoring + an LLM-ready gate, not model-driven authoring.'
  - id: CF-3
    title: Integration disconnects behind a "complete" label
    detail: 'planner not wired to cost/compliance (hardcoded deferred); @iap/deploy orphaned (unimported, CLI stubs); planner/deploy/provider plan shapes do not connect; MCP server has no wire transport. ROADMAP.yaml says "WHOLE ROADMAP COMPLETE" but phases 5-8 conformance, 10/11 plan-deltas, 14 execution, and the MCP transport are not delivered end-to-end.'
