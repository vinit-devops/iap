        title: VS Code in-editor assistant panel (optional / stretch)
        status: deferred
        dependsOn: [M20.3]
        note: Deferred by requester 2026-07-15.
        exitCriteria:
          - Panel authors a doc from NL and shows per-field provenance inside VS Code
        evidence: []

    releaseGates:
      - Root LICENSE (Apache-2.0) committed; no "SEE LICENSE (TBD)" remains
      - Clean-machine gate — npm i -g @infraasprompt/cli && iap validate; npx @infraasprompt/mcp-server handshake (no repo checkout)
      - Marketplace gate — install from Marketplace (VS Code) and OpenVSX (Cursor); live diagnostics on infrastructure.iap.yaml
      - Claude plugin gate — claude plugin install iap; iap_author then iap_validate in a session
      - Interop matrix — each of the 5 clients lists the 5 tools and runs one author + one analysis call
      - Regression — pnpm run verify green (with new smoke:mcp); smoke:vsix green; check:names green; no deploy/mutation tool exposed to any client
