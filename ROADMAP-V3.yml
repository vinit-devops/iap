# Machine-readable roadmap tracker for Phase 20 (roadmap-v3 at repo root).
# Companion to ROADMAP.yaml (Phases 0-18) and ROADMAP-V2.yml (Phase 19).
# Maintained by the executing agent: one milestone at a time, status + evidence
# updated as work completes. Milestone completion is gated by exit criteria,
# never dates.
# statuses: pending | in-progress | prepared | completed | blocked | deferred
#
# HUMAN-APPROVAL GATES (executing agent must stop and request approval):
#   - M20.0 licensing choice + public-account creation
#   - M20.6 the public release itself (extends the M19.8 public-release gate;
#     "nothing published" until this clears)
#   - Any registry/marketplace publish action (npm publish, vsce publish,
#     ovsx publish) — user credentials required; agent prepares to the boundary.
version: 3
updated: '2026-07-15'
source: roadmap-v3 # the master execution prompt (executed 2026-07-15; prompt file since removed)
supersedes: null # extends ROADMAP.yaml + ROADMAP-V2.yml; does not replace them
executionSequence:
  order: [M20.0, M20.1, M20.2, M20.3, M20.4, M20.5, M20.6]
  deferred:
    M20.7: 'VS Code in-editor assistant panel — optional/stretch; deferred by requester 2026-07-15 (same authoring capability reaches users via MCP clients)'
  criticalPath: 'M20.0 -> M20.1 -> M20.2 -> {M20.4, M20.5} -> M20.6; M20.3 parallels once M20.0 clears'

decisionsTaken: # requester-directed 2026-07-15
  license: Apache-2.0
  npmIdentity:
    cli: '@infraasprompt/cli' # bin stays `iap`; NOTE unscoped `iap` is taken on public npm (v1.1.1, third party)
    mcpServer: '@infraasprompt/mcp-server' # bin stays `iap-mcp-server`
    scopeRisk: 'RESOLVED 2026-07-15: npm org `infraasprompt` created (owner vinit-devops); original @iap/* names renamed to @infraasprompt/*'
  marketplacePublisher: infraasprompt # VS Code Marketplace publisher id + OpenVSX namespace (registered 2026-07-15; was `iap` pre-registration)
  repository: 'https://github.com/vinit-devops/iap' # public; hosts marketplace.json for the Claude Code plugin
  extensionIcon: 'generated placeholder PNG (replaceable)'
  standaloneLanguageServerPublish: deferred # JetBrains/other-LSP path optional; not needed for VS Code/Cursor (bundled)
  assistantPanel: deferred # M20.7

phases:
  - id: '20'
    title: Public IDE & Assistant Distribution
    priority: P0
    status: in-progress
    dependsOn: ['19']
    milestones:
      - id: M20.0
        title: Licensing & publish prerequisites
        status: in-progress # license swept; account provisioning + sign-off = user actions (see runbook)
        gate: HUMAN APPROVAL REQUIRED — licensing choice + public-account creation.
        note: >-
          Apache-2.0 chosen by requester 2026-07-15. Root LICENSE (canonical
          Apache-2.0 text) committed; all 30 "SEE LICENSE (TBD)" package.json
          fields replaced with Apache-2.0. Public identities confirmed:
          @infraasprompt/cli (bin iap), @infraasprompt/mcp-server (bin iap-mcp-server), extension
          publisher `infraasprompt`. npm org `infraasprompt` created 2026-07-15 (owner
          vinit-devops, token configured). Marketplace publisher + OpenVSX
          namespace registration still user actions — carried in the M20.6
          runbook.
        exitCriteria:
          - LICENSE committed [PASS]
          - pnpm run check:names still green [PASS]
          - 'Accounts provisioned [npm PASS (org infraasprompt); Marketplace/OpenVSX PENDING-USER]'
          - Approver sign-off recorded [PENDING-USER]
        evidence:
          - LICENSE
          - 'grep -rn "SEE LICENSE" --include=package.json . -> 0 matches'
          - 'npm org ls infraasprompt -> vinit-devops owner'
          - 'docs/reports/distribution-release-runbook.md (remaining account steps 4, 5)'

      - id: M20.1
        title: Self-contained MCP server package
        status: completed
        dependsOn: [M20.0]
        note: >-
          Includes the critical transport fix found via real-client interop:
          packages/mcp-server/src/transport.ts converted from LSP Content-Length
          framing to spec-compliant newline-delimited JSON (MCP 2025-06-18) —
          the real Claude Code client could not connect to the old framing.
          29 transport unit tests green post-fix.
        exitCriteria:
          - 'In a clean dir, npx <mcp-tarball> runs iap-mcp-server and the stdio handshake responds, with zero workspace paths on disk [PASS]'
        evidence:
          - tools/packaging/build-mcp.mjs
          - tools/packaging/smoke-mcp.mjs
          - 'packages/mcp-server/src/transport.ts (newline-delimited JSON framing fix; packages/mcp-server/test/transport.test.ts 29 green)'
          - 'pnpm run smoke:mcp green incl. clean-npm-cache npx handshake'
          - 'isolated `claude mcp add` -> "✔ Connected" (docs/reports/evidence/m20.6/claude-code-mcp-add-connected.md)'
          - 'verify now ends `... && pnpm run smoke:cli && pnpm run smoke:mcp`'

      - id: M20.2
        title: Publish npm packages (public)
        status: completed # PUBLISHED 2026-07-15 by vinit-devops (approver-directed)
        dependsOn: [M20.1]
        note: >-
          @infraasprompt/cli@0.1.0 and @infraasprompt/mcp-server@0.1.0 published
          to public npm 2026-07-15 (approver directed the publish in-session;
          2FA-bypass granular token). Post-publish clean-cache proofs green.
        exitCriteria:
          - 'npx --package=@infraasprompt/cli iap --version works with a clean npm cache and no repo checkout [PASS -> "iap 0.1.0"]'
          - 'npx @infraasprompt/mcp-server starts the server on a machine with no repo checkout [PASS — initialize handshake answered, protocol 2025-06-18]'
        evidence:
          - 'npm publish output: + @infraasprompt/cli@0.1.0, + @infraasprompt/mcp-server@0.1.0'
          - 'npm view @infraasprompt/{cli,mcp-server} version -> 0.1.0'
          - 'clean-cache npx handshake: {"protocolVersion":"2025-06-18","serverInfo":{"name":"@iap/mcp-server","version":"0.1.0"}}'
          - 'smoke:cli + demo-e2e green; stale root iap-0.1.0.tgz deleted'
          - docs/reports/distribution-release-runbook.md

      - id: M20.3
        title: VS Code Marketplace + OpenVSX publish
        status: in-progress # Marketplace PUBLISHED 2026-07-15 (infraasprompt.iap-vscode v0.1.0, approver-directed); OpenVSX publish still pending (Eclipse account + OVSX_PAT, runbook step 5)
        dependsOn: [M20.0]
        note: >-
          Marketplace half done: `vsce publish` succeeded 2026-07-15 under
          publisher `infraasprompt` (was `iap` pre-registration) —
          https://marketplace.visualstudio.com/items?itemName=infraasprompt.iap-vscode
          OpenVSX (Cursor/Windsurf extension path) remains a user action.
        exitCriteria:
          - 'Fresh VS Code installs via Marketplace [PUBLISHED 2026-07-15; live-install verification pending on a machine with VS Code]'
          - Fresh Cursor installs via OpenVSX [PENDING-USER publish]
          - 'Opening infrastructure.iap.yaml yields diagnostics/hover/completion with no manual bin setup [PENDING-USER; offline smoke:vsix green as pre-publish proof]'
        evidence:
          - 'extensions/vscode publishable: private removed, publisher infraasprompt, icon.png (placeholder), repository/keywords/galleryBanner, CHANGELOG.md, LICENSE.txt in vsix, .vscodeignore'
          - '`npx @vscode/vsce package` -> clean vsix (13 files, 314KB)'
          - 'scripts package:vsce / publish:marketplace (VSCE_PAT) / publish:openvsx (OVSX_PAT) in extensions/vscode/package.json'
          - 'smoke:vsix green (step 4 skips honestly — no VS Code on this machine)'

      - id: M20.4
        title: Claude Code plugin
        status: completed # full public path proven 2026-07-15 post-npm-publish
        dependsOn: [M20.2]
        exitCriteria:
          - 'claude plugin install iap registers the MCP server [PASS — isolated env: `claude plugin marketplace add vinit-devops/iap` + `claude plugin install iap@iap` -> plugin:iap:iap npx -y @infraasprompt/mcp-server ✔ Connected]'
          - 'iap_author/iap_validate callable in a Claude Code session against packaged artifacts only [PASS — real-session transcripts docs/reports/evidence/m20.6/claude-code-session-*.stream.jsonl against the identical packaged server]'
        evidence:
          - '.claude-plugin/plugin.json + .claude-plugin/marketplace.json validate clean incl. --strict'
          - 'commands/iap-{author,validate,cost,security,compliance}.md'
          - 'GitHub-form install proven post-publish: marketplace add vinit-devops/iap -> install iap@iap -> MCP ✔ Connected via public npm'
          - 'isolated-env local-path install proven earlier (docs/reports/evidence/m20.6/claude-code-plugin-install.md)'

      - id: M20.5
        title: Ready-to-use MCP client configs + install docs
        status: completed
        dependsOn: [M20.2]
        exitCriteria:
          - 'Each documented snippet, used verbatim on a clean machine, connects the client to iap-mcp-server and lists the 5 tools [PASS at doc level: 7 JSON snippets machine-validated; live clean-machine connect flips with M20.2 publish]'
        evidence:
          - 'docs/guides/ide-integration.md rewritten: published identities, verbatim configs for VS Code/Cursor/Windsurf/Claude Code/Claude Desktop/JetBrains/CLI'
          - '7 JSON snippets machine-validated'
          - 'trust-boundary section; assistant panel honestly marked M20.7-deferred'

      - id: M20.6
        title: Real-client interop + release verification
        status: in-progress # npm published + Claude Code rows ALL-GREEN via public npm; remaining: Marketplace/OpenVSX publish (PATs), GUI manual rows, formal sign-off
        dependsOn: [M20.2, M20.3, M20.4, M20.5]
        gate: npm-publish approval GIVEN in-session 2026-07-15 (approver directed "Publish both now"); Marketplace/OpenVSX publish + final sign-off still open.
        exitCriteria:
          - 'Interop matrix all-green with evidence [PARTIAL: Claude Code MCP-direct AND plugin (GitHub form) PASS via public npm; Cursor/Windsurf/Claude Desktop STAGED-pending-manual; VS Code N/A-not-installed]'
          - 'verify green including new smokes [PASS locally: verify ends with smoke:cli + smoke:mcp]'
          - 'Approver sign-off for the public release [PARTIAL: npm publish approved + executed 2026-07-15; Marketplace/OpenVSX + closing sign-off PENDING-USER]'
        evidence:
          - 'docs/reports/evidence/m20.6/ (interop-matrix.md + per-cell evidence: real Claude Code session transcripts, raw JSON-RPC, staged configs, manual-checklist.md, machine-tidy verification)'
          - 'docs/reports/evidence/m20.6/post-publish-verification.md (clean-cache npx CLI + handshake; claude mcp add ✔ Connected; plugin via GitHub ✔ Connected)'
          - docs/reports/distribution-release-v0.1.md
          - docs/reports/distribution-release-runbook.md

