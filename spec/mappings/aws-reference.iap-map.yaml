# Illustrative AWS provider mapping (informative).
# Demonstrates the mapping artifact shape from Chapter 12: fail-closed supports
# matrices, ordered first-match realization rules, total derive maps, and
# mandatory abstract-output binding. This mapping is intentionally small; a real
# mapping package covers every kind and value combination it claims to support.
apiVersion: mapping.iap.dev/v1
provider: aws
version: 1.0.0
specCompat: ">=1.0.0 <2.0.0"
description: Reference mapping for Database, Service, and Queue kinds

mappings:
  Database:
    supports:
      fields:
        - spec.class
        - spec.engine
        - spec.engineVersion
        - spec.availability
        - spec.encryption.atRest
        - spec.encryption.inTransit
        - spec.exposure
        - spec.capacity.storage
        - spec.resilience.backup
        - spec.resilience.recoveryPointObjective
        - spec.resilience.recoveryTimeObjective
        - spec.observability.logs
        - spec.observability.metrics
      values:
        spec.class: [relational]
        spec.engine: [postgresql, mysql]
        spec.availability: [standard, high]
        spec.exposure: [private, internal]
      relationships: [replicatesTo, protectedBy, monitoredBy, dependsOn]
    realize:
      - when:
          spec.class: relational
        targets:
          - aws:rds:DBInstance
          - aws:rds:DBSubnetGroup
          - aws:ec2:SecurityGroup
          - aws:secretsmanager:Secret
        derive:
          aws:rds:DBInstance.multiAZ:
            from: spec.availability
            map:
              standard: false
              high: true
          aws:rds:DBInstance.storageEncrypted:
            from: spec.encryption.atRest
            map:
              required: true
              preferred: true
          aws:rds:DBInstance.publiclyAccessible:
            constant: false
          aws:rds:DBInstance.engine:
            from: spec.engine
            map:
              postgresql: postgres
              mysql: mysql
    outputs:
      identifier:
        from: aws:rds:DBInstance.dbiResourceId
      endpoint:
        from: aws:rds:DBInstance.endpoint
      connectionSecret:
        from: aws:secretsmanager:Secret.arn

  Service:
    supports:
      fields:
        - spec.artifact.type
        - spec.artifact.reference
        - spec.runtime
        - spec.size
        - spec.scaling.min
        - spec.scaling.max
        - spec.scaling.targetUtilization
        - spec.exposure
        - spec.availability
        - spec.encryption.inTransit
        - spec.observability.logs
        - spec.observability.metrics
        - spec.observability.traces
      values:
        spec.artifact.type: [container-image]
        spec.runtime: [container]
        spec.size: [xs, s, m, l, xl]
      relationships:
        - connectsTo
        - authenticatedBy
        - storesDataIn
        - publishesTo
        - consumesFrom
        - dependsOn
        - monitoredBy
    realize:
      - targets:
          - aws:ecs:TaskDefinition
          - aws:ecs:Service
          - aws:elbv2:TargetGroup
          - aws:ec2:SecurityGroup
        derive:
          aws:ecs:TaskDefinition.cpu:
            from: spec.size
            map:
              xs: 256
              s: 512
              m: 1024
              l: 2048
              xl: 4096
          aws:ecs:TaskDefinition.memory:
            from: spec.size
            map:
              xs: 512
              s: 1024
              m: 2048
              l: 4096
              xl: 8192
    outputs:
      identifier:
        from: aws:ecs:Service.serviceArn
      endpoint:
        from: aws:elbv2:TargetGroup.dnsName

  Queue:
    supports:
      fields:
        - spec.delivery
        - spec.ordering
        - spec.messageRetention
        - spec.deadLetter.enabled
        - spec.deadLetter.maxReceives
        - spec.encryption.atRest
        - spec.encryption.inTransit
      values:
        spec.delivery: [at-least-once]
        spec.ordering: [none, fifo]
      relationships: [monitoredBy, dependsOn]
    realize:
      - when:
          spec.ordering: fifo
        targets:
          - aws:sqs:Queue
        derive:
          aws:sqs:Queue.fifoQueue:
            constant: true
      - targets:
          - aws:sqs:Queue
        derive:
          aws:sqs:Queue.fifoQueue:
            constant: false
    outputs:
      identifier:
        from: aws:sqs:Queue.queueArn
      endpoint:
        from: aws:sqs:Queue.queueUrl
