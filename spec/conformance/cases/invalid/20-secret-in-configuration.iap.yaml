# Conformance case: invalid/20-secret-in-configuration
# expected: IAP602
# reason: Passes schema validation (configuration is a free string map), but
#         the key DB_PASSWORD matches the published credential-key pattern
#         (?i)(password|passwd|secret|token|api[-_]?key|private[-_]?key), so
#         the document carries plaintext secret material inline. Secret values
#         MUST be modeled as Secret resources wired via relationships
#         (chapter 15); fails phase 6 (security analysis) with IAP602.
#         Requires a full IaP validator — plain JSON Schema validation MUST
#         report this document as valid.

apiVersion: iap.dev/v1

metadata:
  name: secret-in-configuration-case

resources:
  api:
    kind: Service
    spec:
      artifact:
        type: container-image
        reference: registry.example.com/api:1.0.0
      configuration:
        LOG_LEVEL: info
        DB_PASSWORD: hunter2
