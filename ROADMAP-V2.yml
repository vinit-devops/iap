          - docs/reports/security-readiness.md
          - docs/security/known-risks.yaml
          - docs/security/sbom.cdx.json
          - SECURITY.md
          - packages/provider-sdk/src/signing.ts

      - id: M19.7
        title: Product evidence and benchmark validation (>=20 benchmark requests)
        status: completed
        dependsOn: [M19.3, M19.4]
        note: >-
          26 benchmark cases (16/16 §13 categories). Honest measured metrics —
          valid-IaP 100% (well-formed), unsupported/conflict detection 57% (3
          candid misses), plan determinism 100%, 0 invented resources; deployment
