          - tests/benchmarks/run.mjs
          - docs/reports/product-evidence.md

      - id: M19.8
        title: Developer Preview release
        status: prepared # release-readiness assembled; ALL §15 mandatory gates PASS. Awaiting publication approval (+ git/registry access).
        dependsOn: [M19.1, M19.3, M19.4, M19.5, M19.6, M19.7]
        gate: HUMAN APPROVAL REQUIRED — public release. Nothing published; no git/registry action taken.
        note: >-
          Release notes + known limitations + the §15 mandatory-gate checklist assembled;
          every gate PASS with evidence (deployment gates satisfied by the M19.3 live run —
          a v0.2 capability present but not marketed in v0.1). Proposed version 0.1.0.
        evidence:
          - docs/reports/developer-preview-v0.1-release.md

    releaseGates:
      - IaP rename migration passes; no unclassified old project naming remains
      - Clean installation, build, type-check, tests, conformance, determinism pass
      - No critical security finding; no plaintext-secret leakage
      - CLI installs externally; natural language produces valid IaP
      - AWS plan deterministic; real AWS create/no-op/update succeed
      - State locking works; drift detected; failure recovery tested
      - Destroy requires confirmation; cleanup verified; known limitations public
