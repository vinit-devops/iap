            status: completed
            evidence:
              [
                packages/mcp-server/src/transport.ts,
                packages/mcp-server/src/bin.ts,
                packages/mcp-server/test/transport.test.ts,
              ]
          - id: 3-vsix
            title: Packaged VS Code .vsix (registers iap language, launches LSP)
            status: completed
            note: Hand-assembled OPC zip (no vsce); vscode-languageclient guarded for offline. smoke:vsix passes.
            evidence: [extensions/vscode/]
          - id: 4-designer
            title: Runnable local Visual Designer shell (HTTP + UI over DesignerSession)
            status: completed
            note: node:http shell; all edits go through the compiler gate server-side. smoke:designer 15/15.
            evidence: [apps/designer/]
          - id: 5-smoke
            title: Clean-machine + tarball smoke tests
            status: completed
            evidence: [tools/packaging/smoke-cli.mjs, tools/packaging/demo-e2e.mjs]
          - id: 6-demo
            title: Demonstration repo using packaged artifacts only
            status: completed
            evidence: [examples/iap-demo/]
        gate:
          requirement: External clean env can install IaP, author from NL, validate + analyze, and produce a deterministic AWS plan preview.
          status: MET
          evidence: 'pnpm run smoke:demo → PASS; planId sha256:ff21f7f96fc4c309c56f9fe5a8042ecb23660c0ea9b91e1313e193a9a145807e (deterministic across two runs)'
        evidence:
