        status: completed
        note: apps/playground (@iap/playground) plan-only web shell; smoke 23/23, deterministic planId, credentials rejected 400, no @aws-sdk/deploy path. Guardrails per roadmap §11.
        dependsOn: [M19.2]
        evidence: [apps/playground/, package.json (smoke:playground)]

      - id: M19.6
        title: Security hardening (threat model, SBOM, scanning, signing)
        status: completed
        dependsOn: [M19.2]
        note: >-
          Internal engineering review (NOT a pen test). Dependency scan 0 vulns/215;
          secret scan clean (reviewed baseline); CycloneDX SBOM (32 components);
          provider ed25519 signing + fail-closed loader verified; MCP read-only
          boundary. scan:secrets added to verify. Top residual risk RISK-002
          (deployment-credential/OIDC surface, deferred to v0.2).
        tooling:
