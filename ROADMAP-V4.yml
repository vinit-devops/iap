# Machine-readable roadmap tracker for Phases 21-24 (roadmap-v4 at repo root).
# Companion to the retired ROADMAP.yaml (Phases 0-18), ROADMAP-V2.yml (Phase 19)
# and ROADMAP-V3.yml (Phase 20), all removed in e10ebe0 and recoverable at e10ebe0^.
# Maintained by the executing agent: one milestone at a time, status + evidence
# updated as work completes. Milestone completion is gated by exit criteria,
# never dates.
# statuses: pending | in-progress | prepared | completed | blocked | deferred
#
# HUMAN-APPROVAL GATES (executing agent must stop and request approval):
#   - Every live-run wave (M21.2, M21.3, M22.1-M22.5, M23.2, M23.4, M23.5,
#     M24.2, M24.3) — agent prepares to the boundary, human approves the wave;
#     execution is then PER SERVICE individually (one live run + evidence doc
#     per service, sequential, full teardown between services —
#     requester-directed 2026-07-16).
#   - AWS account/profile selection: asked of the user at the FIRST live-run
#     wave (M21.2) only; all subsequent waves reuse that provided AWS profile
#     without re-asking (requester-directed 2026-07-16).
#   - Every spec minor release (M23.1 -> 1.1.0, M23.3 -> 1.2.0, M24.1 -> 1.3.0)
#     — additive vocabulary changes need explicit sign-off before schema lands.
#   - MSK live evidence (inside M23.5) has its own approval gate — the handler
#     may ship mock-tested while the live run is deferred.
#   - Each M24.3 stretch item (EKS, AppSync, SES) is individually gated.
