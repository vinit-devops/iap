# Protected occurrences of the legacy "IIS" name after the HARD IIS -> IaP
# rename (Phase 19, M19.0, roadmap-v2 §19). Every file listed here is ALLOWED to
# still contain the old name; the allowlist gate (tools/check-legacy-names.mjs)
# FAILS for any project-specific old-name occurrence in a file NOT listed here.
#
# There is NO Category B (legacy compatibility): the rename is a pre-release
# breaking cut with no aliases, no legacy apiVersion, no compat wrappers. The
# only permitted remainders are: the migration record itself, the historical
# changelog/plan/tracker docs, external Microsoft IIS references, the incidental-
# substring guard, and generated/lockfile content.
#
# Categories:  C = external/unrelated (Microsoft IIS)  ·  D = incidental substring
#              E = generated/vendored  ·  H = historical/migration record
version: 1
kind: protected-occurrences
allow:
  # --- H: migration record + historical documents (retain "IIS" by design) ---
  - {
      file: docs/migrations/iis-to-iap-hard-rename-map.yaml,
      category: H,
      reason: 'The rename map — enumerates every from/to; must contain the old names.',
    }
  - {
      file: docs/migrations/iis-to-iap-protected-occurrences.yaml,
      category: H,
      reason: 'This file — lists old-name occurrences.',
    }
  - {
      file: docs/reports/iis-to-iap-hard-rename-inventory.md,
      category: H,
      reason: 'The rename inventory report.',
    }
  - {
      file: docs/migrations/iis-to-iap.md,
      category: H,
      reason: 'Hard-rename record / historical note of the former pre-release name.',
    }
  - {
      file: docs/adr/ADR-0003-iap-naming-migration.md,
      category: H,
      reason: 'ADR recording the rename decision; references the old name.',
    }
  - {
      file: spec/ieps/IEP-0014-iap-naming-migration.md,
      category: H,
      reason: 'IEP recording the normative rename; references the old name.',
    }
  - {
      file: CHANGELOG.md,
      category: H,
      reason: 'Historical changelog entries predating the rename.',
    }
  - {
      file: ROADMAP.yaml,
      category: H,
      reason: 'Historical tracker for the completed Phases 0-18 (named IIS at the time).',
    }
  - {
      file: ROADMAP-V2.yml,
      category: H,
      reason: 'Phase 19 tracker; records the from/to rename metadata.',
    }
  - {
      file: roadmap,
      category: H,
      reason: 'Original master execution prompt (historical planning artifact).',
    }
  - {
      file: roadmap-v2,
      category: C,
      reason: 'Phase-19 execution prompt; contains external Microsoft IIS references and the rename instructions.',
    }

  # --- C: external Microsoft IIS references (PERMANENT, never rename) ---
  - {
      file: roadmap-v2,
      line: 27,
      category: C,
      pattern: 'Microsoft IIS',
      reason: 'External reference to Microsoft Internet Information Services.',
      permanent: true,
    }
  - {
      file: roadmap-v2,
      line: 124,
      category: C,
      pattern: 'Microsoft IIS',
      reason: 'External Microsoft IIS reference.',
      permanent: true,
    }
  - {
      file: roadmap-v2,
      line: 166,
      category: C,
      pattern: 'Microsoft Internet Information Services',
      reason: 'Full external product name.',
      permanent: true,
    }
  - {
      file: roadmap-v2,
      line: 313,
      category: C,
      pattern: 'Microsoft IIS',
      reason: 'Instruction to protect external Microsoft IIS references.',
      permanent: true,
    }
  - {
      file: roadmap-v2,
      line: 496,
      category: C,
      pattern: 'Microsoft IIS',
      reason: 'Exit-criterion text protecting external Microsoft IIS references.',
      permanent: true,
    }
  - {
      file: roadmap-v2,
      line: 832,
      category: C,
      pattern: 'Microsoft IIS',
      reason: 'Self-referential guard on external Microsoft IIS material.',
      permanent: true,
    }

  # --- D: incidental-substring guard (PERMANENT; 0 real hits today) ---
  - {
      file: '**',
      category: D,
      pattern: 'case-insensitive `iis` inside an unrelated word or hex hash',
      reason: 'No word in the tree contains the `iis` sequence, but a naive case-insensitive s/iis/iap/ would corrupt words (e.g. "Hawaii") or hashes. Renames MUST stay token/identifier-scoped.',
      permanent: true,
    }

  # --- E: generated / vendored (regenerated from canonical source, not hand-edited) ---
  - {
      file: pnpm-lock.yaml,
      category: E,
      reason: 'Lockfile — regenerated by pnpm from the renamed workspace manifests.',
    }
  - {
      file: tools/rename-iis-to-iap.mjs,
      category: E,
      reason: 'The rename engine — necessarily contains the old-name patterns as string literals.',
    }
  - {
      file: tools/check-legacy-names.mjs,
      category: E,
      reason: 'This allowlist gate — necessarily contains the old-name patterns as string literals.',
    }
